# What happens when a player trips the honeypot: ban | kick | none.
action: ban
broadcast: true

ban-reason: griefing
kick-message: You have been caught destroying a honeypot block.
# Recorded as the ban's source, like console /ban does ("Server").
ban-source: Server
broadcast-message: '<dark_red>[Honeypot]<gray> Player <dark_red><player><gray> was caught breaking a honeypot block.'

# Send a catch alert to Discord through DiscordSRV (ignored if it isn't installed).
# discord-channel is a DiscordSRV "Channels:" name (e.g. global), not a raw ID.
# discord-message is plain Discord markdown; <player> is substituted.
discord-notify: true
discord-channel: global
discord-message: ':rotating_light: **<player>** was caught breaking a honeypot block.'

# Non-empty lists override the built-in ban/kick API with console commands.
# Placeholders: %player%, %reason%
ban-commands: []
kick-commands: []

# Total points required to trip the honeypot; blocks not in the map are 1 point.
offense-points: 32
offense-point-map:
  GLASS: 5
  WHITE_WOOL: 5
  ORANGE_WOOL: 5
  MAGENTA_WOOL: 5
  LIGHT_BLUE_WOOL: 5
  YELLOW_WOOL: 5
  LIME_WOOL: 5
  PINK_WOOL: 5
  GRAY_WOOL: 5
  LIGHT_GRAY_WOOL: 5
  CYAN_WOOL: 5
  PURPLE_WOOL: 5
  BLUE_WOOL: 5
  BROWN_WOOL: 5
  GREEN_WOOL: 5
  RED_WOOL: 5
  BLACK_WOOL: 5
  EMERALD_BLOCK: 5
  PRISMARINE: 3

# Also append catches to logs/honeypot.log
log-to-file: true
